[project.theme]
name = "material"
logo = "assets/hexanomicon.png"
favicon = "assets/hexanomicon.png"
custom_dir = "docs/overrides"
features = [
    "navigation.instant",
    "navigation.indexes",
    "navigation.footer",
    "navigation.tracking",
    "navigation.top",
    "content.code.copy",
    "content.action.edit",
    "content.action.view"
]

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "cyan"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.snippets]
check_paths = true
base_path = ["."]
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/hexanomicon"
name = "hexanomicon on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/lychd/"
name = "lychd on PyPI"

[[project.extra.social]]
icon = "fontawesome/solid/envelope"
link = "mailto:hexanomicon@proton.me"
name = "Contact the Magus"
