[project]
site_name = "The Hexanomicon"
site_author = "The Hexanomicon"
site_description = "Systemd-native daemon for local agentic orchestration"
site_url = "https://hexanomicon.github.io/lychd/"
docs_dir = "docs"
repo_name = "hexanomicon/lychd"
repo_url = "https://github.com/hexanomicon/lychd"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2026 Hexanomicon &ndash;"

extra_css = ["stylesheets/frostmourne.css"]
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

